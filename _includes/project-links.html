{% assign project = site.data.projects | where: "slug", include.slug | first %}
{% if project %}
  <section class="project-related" itemscope itemtype="https://schema.org/CreativeWork">
    <meta itemprop="name" content="{{ project.title }}">
    <meta itemprop="url" content="{{ site.url }}{{ project.url }}">
    {% if project.publications.size > 0 %}
      <h2 id="related-publications">Related publications</h2>
      <ul>
        {% for publication in project.publications %}
          <li><a href="{{ publication.url }}">{{ publication.title }}</a></li>
        {% endfor %}
      </ul>
    {% endif %}
  </section>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CreativeWork",
    "name": {{ project.title | jsonify }},
    "url": {{ site.url | append: project.url | jsonify }},
    "keywords": [{% for topic in project.topics %}{{ topic.name | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}]
  }
  </script>
{% endif %}
